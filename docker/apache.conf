<VirtualHost *:80>
    DocumentRoot /var/www/html/crm/public

    # PHP configuration
    php_flag short_open_tag Off
    php_flag log_errors On
    php_flag display_errors Off
    php_value error_reporting E_ALL
    php_value error_log /proc/self/fd/2

    # Serve the COB theme CSS
    Alias /COB /var/www/html/crm/data/Themes/COB/public

    <Directory /var/www/html/crm/data/Themes/COB/public>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/crm/public>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        # Enable URL rewriting
        <IfModule mod_rewrite.c>
            RewriteEngine On

            # Base directory
            RewriteBase /

            # Serve existing files directly
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d

            # Route everything else to index.php
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>

        # Optional: prevent directory listing
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
