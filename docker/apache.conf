<VirtualHost *:80>
    DocumentRoot /var/www/html/crm/public

    <Directory /var/www/html/crm/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Serve the COB theme CSS
    Alias /COB /var/www/html/crm/data/Themes/COB/public

    <Directory /var/www/html/crm/data/Themes/COB/public>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
