<VirtualHost *:80>
    DocumentRoot /var/www/html/crm/public

    # PHP configuration
    php_flag short_open_tag Off
    php_flag log_errors On
    php_flag display_errors Off
    php_value error_reporting E_ALL
    php_value error_log /proc/self/fd/2
    php_value post_max_size 10M
    php_value upload_max_filesize 10M

    # Serve the COB theme CSS
    Alias /COB /var/www/html/crm/data/Themes/COB/public

    <Directory /var/www/html/crm/data/Themes/COB/public>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /media /var/www/html/crm/data/media
    <Directory /var/www/html/crm/data/media>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule .? index.php [NC,L]
    </Directory>

    <Directory /var/www/html/crm/public>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On

        # Base directory
        RewriteBase /

        # Serve existing files directly
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d

        # Route everything else to index.php
        RewriteRule ^(.*)$ index.php [QSA,L]

        # Optional: prevent directory listing
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
